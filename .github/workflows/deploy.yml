name: Deploy FetchDesk

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor
        run: dotnet publish FetchDesk.Client/FetchDesk.Client.csproj -c Release -o release/publish

      - name: Fix SPA routing
        run: |
          cp release/publish/wwwroot/index.html release/publish/wwwroot/404.html
          touch release/publish/wwwroot/.nojekyll

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: release/publish/wwwroot